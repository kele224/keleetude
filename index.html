<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Etude | Plateforme Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; scroll-behavior: smooth; }
        .ar-font { font-family: 'Noto Sans Arabic', sans-serif; direction: rtl; }
        .bg-premium { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        canvas { width: 100%; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); background: white; }
        .loader { border-top-color: #f472b6; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <!-- NAVIGATION PRINCIPALE -->
    <nav class="glass sticky top-0 z-50 p-4 mb-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-premium p-2 rounded-lg shadow-lg shadow-indigo-500/40">
                    <i data-lucide="graduation-cap" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-bold text-xl tracking-tight">Kele-<span class="text-pink-500">Etude</span></span>
            </div>
            
            <div class="flex items-center gap-4 bg-black/30 p-1.5 rounded-2xl border border-white/10">
                <button onclick="changePage(-1)" class="p-2 hover:bg-white/10 rounded-xl transition text-pink-400"><i data-lucide="arrow-left-circle"></i></button>
                <div class="flex flex-col items-center px-2">
                    <input type="number" id="pageNumber" value="1" min="1" onchange="renderLesson()" class="bg-transparent font-bold text-white w-10 text-center outline-none">
                    <span class="text-[8px] uppercase text-slate-500 font-black">Page / 812</span>
                </div>
                <button onclick="changePage(1)" class="p-2 hover:bg-white/10 rounded-xl transition text-pink-400"><i data-lucide="arrow-right-circle"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- COLONNE GAUCHE : LE MANUEL (2/3) -->
        <div class="lg:col-span-2 space-y-8">
            <!-- Image du PDF -->
            <div class="relative group">
                <div class="flex items-center gap-2 mb-3 text-slate-400">
                    <i data-lucide="book-open" class="w-4 h-4"></i>
                    <h2 class="text-[10px] font-black uppercase tracking-widest">Fac-similé du manuel</h2>
                </div>
                <div id="pdf-container" class="bg-slate-800 rounded-[32px] p-2 border border-white/5 relative">
                    <canvas id="pdf-canvas"></canvas>
                    <div id="pdf-loader" class="absolute inset-0 flex items-center justify-center bg-slate-900/50 rounded-[32px] hidden">
                        <div class="loader w-12 h-12 border-4 rounded-full"></div>
                    </div>
                </div>
            </div>

            <!-- Texte extrait et Traduction Automatique -->
            <div class="space-y-6">
                <div class="flex items-center gap-3">
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Analyse de contenu</span>
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <div class="glass rounded-[32px] p-8">
                        <h3 class="text-indigo-400 font-bold text-xs uppercase mb-6 tracking-widest flex items-center gap-2">
                            <i data-lucide="align-right" class="w-4 h-4"></i> Texte Arabe Extrait
                        </h3>
                        <div id="ar-content" class="ar-font text-2xl md:text-3xl leading-loose text-white/90">
                            Chargement du texte...
                        </div>
                    </div>

                    <div class="bg-premium rounded-[32px] p-8 shadow-2xl shadow-indigo-500/20">
                        <h3 class="text-white font-bold text-xs uppercase mb-6 tracking-widest flex items-center gap-2">
                            <i data-lucide="languages" class="w-4 h-4"></i> Traduction Kele-IA
                        </h3>
                        <div id="fr-content" class="text-white text-lg md:text-xl leading-relaxed italic font-medium">
                            Analyse en cours...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- COLONNE DROITE : DICTIONNAIRE DE POCHE (1/3) -->
        <div class="lg:sticky lg:top-28 h-fit">
            <div class="glass rounded-[32px] p-6 border-pink-500/20 shadow-xl">
                <div class="flex items-center gap-3 mb-6">
                    <i data-lucide="search" class="text-pink-500"></i>
                    <h2 class="font-bold text-sm">Dictionnaire de poche</h2>
                </div>
                <div class="space-y-4">
                    <textarea id="word-input" rows="2" class="w-full bg-black/20 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-pink-500 transition" placeholder="Un mot vous échappe ? Tapez-le ici..."></textarea>
                    <button onclick="translateWord()" id="btn-word" class="w-full py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-xs font-bold transition flex items-center justify-center gap-2">
                        Chercher le sens
                    </button>
                    <div id="word-output" class="p-4 bg-pink-500/10 rounded-2xl text-pink-200 text-sm hidden border border-pink-500/20">
                        <!-- Résultat dictionnaire -->
                    </div>
                </div>
                <div class="mt-6 p-4 bg-blue-500/5 rounded-2xl border border-blue-500/10">
                    <p class="text-[10px] text-slate-400 leading-relaxed">
                        <i data-lucide="info" class="w-3 h-3 inline mr-1"></i> Astuce : Utilisez ce traducteur pour les mots isolés, l'IA centrale s'occupe des phrases complètes.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- BOUTONS DE NAVIGATION BAS DE PAGE (MOBILE) -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-4 z-40">
        <button onclick="changePage(-1)" class="bg-slate-800 p-4 rounded-2xl shadow-2xl border border-white/10 hover:bg-slate-700 transition active:scale-90">
            <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </button>
        <button onclick="changePage(1)" class="bg-indigo-600 p-4 rounded-2xl shadow-2xl border border-indigo-400 hover:bg-indigo-500 transition active:scale-90">
            <i data-lucide="arrow-right" class="w-6 h-6"></i>
        </button>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;

        // INITIALISATION
        const init = async () => {
            lucide.createIcons();
            try {
                const loadingTask = pdfjsLib.getDocument('manuel.pdf');
                pdfDoc = await loadingTask.promise;
                renderLesson();
            } catch (e) {
                alert("Erreur : manuel.pdf introuvable sur votre GitHub.");
            }
        };

        // RENDU DE LA LEÇON (IMAGE + TEXTE + TRADUCTION)
        window.renderLesson = async () => {
            const num = parseInt(document.getElementById('pageNumber').value);
            const arArea = document.getElementById('ar-content');
            const frArea = document.getElementById('fr-content');
            const loader = document.getElementById('pdf-loader');

            loader.classList.remove('hidden');
            arArea.innerText = "...";
            frArea.innerText = "L'IA analyse la page...";

            try {
                // 1. Image du PDF
                const page = await pdfDoc.getPage(num);
                const canvas = document.getElementById('pdf-canvas');
                const ctx = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                // 2. Extraction du Texte
                const textContent = await page.getTextContent();
                const text = textContent.items.map(item => item.str).join(' ').replace(/\s+/g, ' ').trim();
                
                if(text.length > 5) {
                    arArea.innerText = text;
                    // 3. Traduction Automatique
                    const app = await Client.connect("soumah224/mon-traducteur");
                    const result = await app.predict("/predict", [text, "Arabe", "Français"]);
                    frArea.innerHTML = result.data[0].replace(/\n/g, '<br>');
                } else {
                    arArea.innerText = "Page vide ou scan d'image.";
                    frArea.innerText = "-";
                }
            } catch (err) {
                console.error(err);
            } finally {
                loader.classList.add('hidden');
                lucide.createIcons();
            }
        };

        // DICTIONNAIRE DE CÔTÉ
        window.translateWord = async () => {
            const word = document.getElementById('word-input').value;
            const output = document.getElementById('word-output');
            const btn = document.getElementById('btn-word');
            if(!word) return;

            btn.innerText = "Recherche...";
            try {
                const app = await Client.connect("soumah224/mon-traducteur");
                const result = await app.predict("/predict", [word, "Arabe", "Français"]);
                output.innerText = result.data[0];
                output.classList.remove('hidden');
            } catch (e) {
                alert("Erreur API");
            } finally {
                btn.innerText = "Chercher le sens";
            }
        };

        // NAVIGATION
        window.changePage = (offset) => {
            pageNum = parseInt(document.getElementById('pageNumber').value) + offset;
            if(pageNum < 1) pageNum = 1;
            if(pageNum > 812) pageNum = 812;
            document.getElementById('pageNumber').value = pageNum;
            renderLesson();
            window.scrollTo(0,0);
        };

        window.onload = init;
    </script>
</body>
            </html>
