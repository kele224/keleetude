<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Etude | Apprentissage Bilingue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }
        /* Nouveau Dégradé Premium */
        .bg-premium {
            background: linear-gradient(135deg, #312e81 0%, #5b21b6 50%, #9d174d 100%);
        }
        .ar-font { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            direction: rtl; 
        }
        .glass-header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .lesson-unit {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 2rem 0;
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .loader-spin {
            border-top-color: #f472b6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="glass-header sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-premium p-2 rounded-xl">
                    <i data-lucide="book-open-check" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tighter">Kele-<span class="text-pink-500">Etude</span></span>
            </div>
            
            <div class="flex items-center gap-3 bg-white/5 p-1 rounded-full border border-white/10">
                <button onclick="changePage(-1)" class="p-2 hover:bg-white/10 rounded-full transition"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                <div class="flex items-center gap-1">
                    <input type="number" id="pageNumber" value="1" min="1" class="bg-transparent w-10 text-center font-bold text-pink-400 outline-none">
                    <span class="text-slate-500 text-[10px] uppercase font-bold">/ 812</span>
                </div>
                <button onclick="changePage(1)" class="p-2 hover:bg-white/10 rounded-full transition"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 md:p-12">
        
        <!-- HEADER DE LA LEÇON -->
        <header class="mb-12 text-center">
            <div id="page-tag" class="text-pink-500 font-bold text-xs uppercase tracking-widest mb-2">Chargement...</div>
            <h1 class="text-3xl md:text-4xl font-black text-white">Analyse Interactive</h1>
        </header>

        <!-- ZONE D'AFFICHAGE DES COURS INTERCALÉS -->
        <div id="course-container" class="space-y-4">
            <!-- Les phrases Arabe + Traduction seront générées ici -->
            <div class="text-center py-20 text-slate-500">
                <div class="loader-spin w-10 h-10 border-4 rounded-full mx-auto mb-4"></div>
                Ouverture du manuel...
            </div>
        </div>

    </main>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;

        // 1. CHARGER LE PDF
        const init = async () => {
            try {
                const loadingTask = pdfjsLib.getDocument('manuel.pdf');
                pdfDoc = await loadingTask.promise;
                renderLesson();
            } catch (err) {
                document.getElementById('course-container').innerText = "Fichier 'manuel.pdf' non trouvé.";
            }
        };

        // 2. EXTRAIRE ET DÉCOUPER LE TEXTE
        async function renderLesson() {
            const container = document.getElementById('course-container');
            const pageTag = document.getElementById('page-tag');
            
            container.innerHTML = '<div class="text-center py-20 text-slate-500"><div class="loader-spin w-10 h-10 border-4 rounded-full mx-auto mb-4"></div>Lecture de la page...</div>';
            pageTag.innerText = `PAGE ${pageNum}`;

            const page = await pdfDoc.getPage(pageNum);
            const textContent = await page.getTextContent();
            
            // On récupère tout le texte de la page
            let fullText = textContent.items.map(item => item.str).join(' ');
            
            // DÉCOUPAGE INTELLIGENT
            // On coupe par puce (•) ou par point suivi d'un espace.
            let phrases = fullText.split(/(?=•)|(?<=[.!?])\s+/g);
            
            container.innerHTML = ""; // On vide pour afficher les nouveaux blocs

            for (let phrase of phrases) {
                if (phrase.trim().length < 3) continue;

                // Créer le conteneur de la phrase
                const unit = document.createElement('div');
                unit.className = "lesson-unit";
                
                // Bloc Arabe
                const arPart = document.createElement('div');
                arPart.className = "ar-font text-2xl md:text-3xl mb-4 text-white leading-relaxed";
                arPart.innerText = phrase.trim();
                
                // Bloc Traduction (en attente)
                const frPart = document.createElement('div');
                frPart.className = "text-slate-400 text-lg italic animate-pulse";
                frPart.innerText = "Traduction...";

                unit.appendChild(arPart);
                unit.appendChild(frPart);
                container.appendChild(unit);

                // Appel de la traduction pour cette phrase précise
                translateUnit(phrase.trim(), frPart);
            }
        }

        // 3. TRADUCTION INDIVIDUELLE VIA API
        async function translateUnit(text, element) {
            try {
                const app = await Client.connect("soumah224/mon-traducteur");
                const result = await app.predict("/predict", [text, "Arabe", "Français"]);
                
                element.classList.remove('animate-pulse', 'text-slate-500');
                element.classList.add('text-pink-400', 'font-medium');
                element.innerText = result.data[0];
            } catch (e) {
                element.innerText = "[Erreur de traduction]";
            }
        }

        // NAVIGATION
        window.changePage = (offset) => {
            let next = pageNum + offset;
            if (next >= 1 && next <= pdfDoc.numPages) {
                pageNum = next;
                document.getElementById('pageNumber').value = pageNum;
                renderLesson();
            }
        };

        window.onload = () => {
            lucide.createIcons();
            init();
        };
    </script>
</body>
    </html>
