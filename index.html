<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Etude | Manuel Interactif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliothèques essentielles -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a;
            color: white;
        }
        .bg-premium {
            background: linear-gradient(135deg, #4338ca 0%, #7c3aed 50%, #db2777 100%);
        }
        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #pdf-canvas {
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }
        .loader {
            border-top-color: #f472b6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="glass-nav sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-premium p-2 rounded-lg">
                    <i data-lucide="book-open-check" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tighter">Kele-<span class="text-pink-500">Etude</span></span>
            </div>
            
            <div class="flex items-center gap-3 bg-white/5 p-1 rounded-full border border-white/10">
                <button onclick="prevPage()" class="p-2 hover:bg-white/10 rounded-full transition"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                <div class="flex items-center gap-1">
                    <input type="number" id="pageNumber" value="1" min="1" class="bg-transparent w-10 text-center font-bold text-pink-400 outline-none">
                    <span class="text-slate-500 text-[10px] uppercase font-bold">/ <span id="total-pages">812</span></span>
                </div>
                <button onclick="nextPage()" class="p-2 hover:bg-white/10 rounded-full transition"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-10">
        
        <!-- ZONE 1 : LE PDF VISUEL -->
        <div class="space-y-4">
            <div class="flex items-center gap-2 text-slate-400">
                <i data-lucide="eye" class="w-4 h-4"></i>
                <h2 class="text-[10px] font-black uppercase tracking-widest">Aperçu du Manuel (manuel.pdf)</h2>
            </div>
            <div class="relative bg-slate-800 rounded-[32px] p-2 border border-white/5">
                <canvas id="pdf-canvas"></canvas>
                <div id="pdf-loader" class="absolute inset-0 flex items-center justify-center bg-slate-900/50 rounded-[32px] hidden">
                    <div class="loader w-12 h-12 border-4 rounded-full"></div>
                </div>
            </div>
        </div>

        <!-- ZONE 2 : TRADUCTION IA -->
        <div class="bg-premium rounded-[40px] p-8 shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold text-xs uppercase tracking-[0.2em] flex items-center gap-2">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> Analyse Kele-IA
                    </h2>
                    <span class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-bold">MODE AUTO</span>
                </div>

                <div id="fr-content" class="text-white text-lg md:text-xl leading-relaxed font-medium italic min-h-[100px]">
                    En attente d'analyse de la page...
                </div>
                
                <div class="mt-8 pt-6 border-t border-white/10 flex justify-between items-center">
                    <p class="text-[9px] text-white/50 font-bold uppercase tracking-widest text-right w-full">Traduction page par page</p>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;
        let isRendering = false;

        // 1. INITIALISATION DU PDF
        const loadPDF = async () => {
            try {
                const loadingTask = pdfjsLib.getDocument('manuel.pdf');
                pdfDoc = await loadingTask.promise;
                document.getElementById('total-pages').innerText = pdfDoc.numPages;
                renderPage(pageNum);
            } catch (err) {
                document.getElementById('fr-content').innerText = "Erreur : manuel.pdf introuvable sur GitHub.";
            }
        };

        // 2. RENDU VISUEL DE LA PAGE
        const renderPage = async (num) => {
            isRendering = true;
            document.getElementById('pdf-loader').classList.remove('hidden');
            
            const page = await pdfDoc.getPage(num);
            const canvas = document.getElementById('pdf-canvas');
            const ctx = canvas.getContext('2d');
            
            const viewport = page.getViewport({ scale: 2 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            
            document.getElementById('pdf-loader').classList.add('hidden');
            
            // 3. EXTRAIRE LE TEXTE ET TRADUIRE
            const textContent = await page.getTextContent();
            const text = textContent.items.map(item => item.str).join(' ');
            
            if (text.trim().length > 5) {
                translateIA(text);
            } else {
                document.getElementById('fr-content').innerText = "Cette page semble être une image. L'IA ne peut pas lire le texte.";
            }
        };

        // 4. APPEL À TON API HUGGING FACE
        async function translateIA(text) {
            const frArea = document.getElementById('fr-content');
            frArea.innerHTML = '<div class="flex gap-2 items-center"><div class="loader w-4 h-4 border-2 rounded-full"></div> Traduction en cours...</div>';
            
            try {
                const app = await Client.connect("soumah224/mon-traducteur");
                const result = await app.predict("/predict", [text, "Arabe", "Français"]);
                frArea.innerHTML = result.data[0].replace(/\n/g, '<br>');
            } catch (e) {
                frArea.innerText = "Erreur de connexion avec ton API Hugging Face.";
            }
        }

        // NAVIGATION
        window.prevPage = () => {
            if (pageNum <= 1) return;
            pageNum--;
            document.getElementById('pageNumber').value = pageNum;
            renderPage(pageNum);
        };

        window.nextPage = () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            document.getElementById('pageNumber').value = pageNum;
            renderPage(pageNum);
        };

        window.onload = () => {
            lucide.createIcons();
            loadPDF();
        };
    </script>
</body>
</html>
