<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Etude | Apprentissage Précis</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
        .bg-kele { background: linear-gradient(135deg, #312e81 0%, #5b21b6 50%, #9d174d 100%); }
        .ar-font { font-family: 'Noto Sans Arabic', sans-serif; direction: rtl; line-height: 1.8; }
        #pdf-canvas { width: 100%; height: auto; border-radius: 20px; background: white; }
        .unit-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; padding: 1.5rem; }
        .loader-spin { border-top-color: #db2777; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/10 p-4">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-kele p-2 rounded-lg shadow-lg">
                    <i data-lucide="graduation-cap" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tighter text-white">Kele-<span class="text-pink-500">Etude</span></span>
            </div>
            
            <div class="flex items-center gap-4 bg-white/5 p-1 rounded-2xl border border-white/10">
                <button onclick="changePage(-1)" class="p-2 hover:bg-white/10 rounded-xl transition text-pink-500">
                    <i data-lucide="chevron-left"></i>
                </button>
                <div class="flex items-center gap-2">
                    <input type="number" id="pageNumber" value="1" min="1" onchange="renderAll()" class="bg-transparent w-12 text-center font-bold text-white outline-none text-lg">
                    <span class="text-slate-500 text-xs font-bold">/ 812</span>
                </div>
                <button onclick="changePage(1)" class="p-2 hover:bg-white/10 rounded-xl transition text-pink-500">
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-12">
        <section class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 flex items-center gap-2">
                    <i data-lucide="image" class="w-3 h-3"></i> Fac-similé du Manuel original
                </h2>
                <span class="text-[9px] bg-pink-500/20 text-pink-400 px-2 py-0.5 rounded shadow-sm">RÉFÉRENCE PRÉCISE</span>
            </div>
            <div class="shadow-2xl shadow-black/50 border border-white/5 rounded-[24px] overflow-hidden bg-white">
                <canvas id="pdf-canvas"></canvas>
            </div>
        </section>

        <section class="space-y-6">
            <h2 class="text-2xl font-bold text-white text-center md:text-left">Analyse Interactive Kele-IA</h2>
            <div id="course-content" class="space-y-6 text-center">
                <!-- Les phrases Arabe/Français seront générées ici -->
            </div>
        </section>
    </main>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;

        async function init() {
            try {
                pdfDoc = await pdfjsLib.getDocument('manuel.pdf').promise;
                renderAll();
            } catch (err) {
                document.getElementById('course-content').innerHTML = "<p class='text-red-500'>manuel.pdf non trouvé.</p>";
            }
        }

        async function renderAll() {
            const container = document.getElementById('course-content');
            container.innerHTML = `<div class="py-20 flex flex-col items-center"><div class="loader-spin w-10 h-10 border-4 border-slate-700 rounded-full mb-4"></div>Lecture...</div>`;

            const page = await pdfDoc.getPage(pageNum);
            const canvas = document.getElementById('pdf-canvas');
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

            const textContent = await page.getTextContent();
            let fullText = textContent.items.map(item => item.str).join(' ');
            let segments = fullText.split(/(?<=[\.\!\?])\s+|(?=•)|(?<=:)\s+/g);
            
            container.innerHTML = "";
            segments.forEach(segment => {
                if (segment.trim().length < 3) return;
                const card = document.createElement('div');
                card.className = "unit-card space-y-4 text-right";
                card.innerHTML = `
                    <div class="ar-font text-2xl text-white leading-relaxed">${segment.trim()}</div>
                    <div class="h-px w-10 bg-pink-500/30 ml-auto"></div>
                    <div class="text-slate-400 text-sm font-medium italic text-left">[Traduction en cours...]</div>
                `;
                container.appendChild(card);
                requestTranslation(segment.trim(), card.querySelector('.italic'));
            });
            lucide.createIcons();
        }

        async function requestTranslation(text, element) {
            try {
                const app = await Client.connect("soumah224/mon-traducteur");
                const result = await app.predict("/predict", [text, "Arabe", "Français"]);
                element.innerText = result.data[0];
                element.classList.replace('text-slate-400', 'text-pink-400');
            } catch (e) { element.innerText = "[Erreur IA]"; }
        }

        window.changePage = (offset) => {
            let next = pageNum + offset;
            if (next >= 1 && next <= pdfDoc.numPages) {
                pageNum = next;
                document.getElementById('pageNumber').value = pageNum;
                renderAll();
            }
        };

        window.onload = () => { lucide.createIcons(); init(); };

        // PWA Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW enregistré !'));
            });
        }
    </script>
</body>
</html>
