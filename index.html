<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Etude | Apprentissage Précis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }
        .bg-kele {
            background: linear-gradient(135deg, #312e81 0%, #5b21b6 50%, #9d174d 100%);
        }
        .ar-font { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            direction: rtl; 
            line-height: 1.8;
        }
        #pdf-canvas {
            width: 100%;
            height: auto;
            border-radius: 20px;
            background: white;
        }
        .unit-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid #db2777;
            transition: all 0.3s ease;
        }
        .unit-card:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .loader-spin {
            border-top-color: #db2777;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-20">

    <!-- NAVIGATION HEADER -->
    <nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/10 p-4">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-kele p-2 rounded-lg shadow-lg">
                    <i data-lucide="graduation-cap" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tighter text-white">Kele-<span class="text-pink-500">Etude</span></span>
            </div>
            
            <!-- Contrôles de Navigation -->
            <div class="flex items-center gap-4 bg-white/5 p-1 rounded-2xl border border-white/10">
                <button onclick="changePage(-1)" class="p-2 hover:bg-white/10 rounded-xl transition text-pink-500">
                    <i data-lucide="chevron-left"></i>
                </button>
                <div class="flex items-center gap-2">
                    <input type="number" id="pageNumber" value="1" min="1" onchange="renderAll()" class="bg-transparent w-12 text-center font-bold text-white outline-none text-lg">
                    <span class="text-slate-500 text-xs font-bold">/ 812</span>
                </div>
                <button onclick="changePage(1)" class="p-2 hover:bg-white/10 rounded-xl transition text-pink-500">
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-12">
        
        <!-- PARTIE 1 : VISUEL DU PDF (LA RÉFÉRENCE) -->
        <section class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 flex items-center gap-2">
                    <i data-lucide="image" class="w-3 h-3"></i> Fac-similé du Manuel original
                </h2>
                <span class="text-[9px] bg-pink-500/20 text-pink-400 px-2 py-0.5 rounded shadow-sm">RÉFÉRENCE 100% PRÉCISE</span>
            </div>
            <div class="shadow-2xl shadow-black/50 border border-white/5 rounded-[24px] overflow-hidden bg-white">
                <canvas id="pdf-canvas"></canvas>
            </div>
        </section>

        <!-- SÉPARATEUR DESIGN -->
        <div class="flex items-center gap-4">
            <div class="h-px flex-1 bg-white/10"></div>
            <i data-lucide="sparkles" class="w-5 h-5 text-pink-500 opacity-50"></i>
            <div class="h-px flex-1 bg-white/10"></div>
        </div>

        <!-- PARTIE 2 : ANALYSE ET TRADUCTION LECON PAR LECON -->
        <section class="space-y-6">
            <div class="text-center md:text-left">
                <h2 class="text-2xl font-bold text-white">Analyse Interactive Kele-IA</h2>
                <p class="text-slate-400 text-sm italic">Le texte est découpé par règle grammaticale pour faciliter la compréhension.</p>
            </div>

            <div id="course-content" class="space-y-4">
                <!-- Les blocs Arabe/Français seront générés ici -->
            </div>
        </section>

    </main>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;

        // 1. CHARGER LE DOCUMENT
        async function init() {
            try {
                const loadingTask = pdfjsLib.getDocument('manuel.pdf');
                pdfDoc = await loadingTask.promise;
                renderAll();
            } catch (err) {
                document.getElementById('course-content').innerHTML = "<p class='text-red-500'>Erreur : manuel.pdf introuvable sur votre GitHub.</p>";
            }
        }

        // 2. RENDRE LE VISUEL ET L'ANALYSE
        async function renderAll() {
            const container = document.getElementById('course-content');
            container.innerHTML = `<div class="flex flex-col items-center py-20 text-slate-500">
                <div class="loader-spin w-10 h-10 border-4 rounded-full mb-4"></div>
                Analyse contextuelle de la page...
            </div>`;

            // Rendu Visuel (Canvas)
            const page = await pdfDoc.getPage(pageNum);
            const canvas = document.getElementById('pdf-canvas');
            const ctx = canvas.getContext('2d');
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            // Extraction du Texte
            const textContent = await page.getTextContent();
            let fullText = textContent.items.map(item => item.str).join(' ');
            
            // Découpage intelligent par les points de grammaire (•) ou fins de phrases
            let segments = fullText.split(/(?=•)|(?<=[.!?])\s+/g);
            container.innerHTML = "";

            for (let segment of segments) {
                if (segment.trim().length < 5) continue;

                const card = document.createElement('div');
                card.className = "unit-card p-6 rounded-2xl space-y-4";
                
                const arText = document.createElement('div');
                arText.className = "ar-font text-2xl text-white text-right";
                arText.innerText = segment.trim();

                const frText = document.createElement('div');
                frText.className = "text-slate-400 text-sm font-medium pl-4 border-l border-white/10 italic";
                frText.innerText = "Traduction en cours...";

                card.appendChild(arText);
                card.appendChild(frText);
                container.appendChild(card);

                // Traduire chaque bloc avec l'API
                requestTranslation(segment.trim(), frText);
            }
            lucide.createIcons();
        }

        // 3. APPEL TRADUCTEUR IA
        async function requestTranslation(text, element) {
            try {
                const app = await Client.connect("soumah224/mon-traducteur");
                const result = await app.predict("/predict", [text, "Arabe", "Français"]);
                element.innerText = result.data[0];
                element.classList.remove('text-slate-400');
                element.classList.add('text-pink-400');
            } catch (e) {
                element.innerText = "[Erreur IA : impossible de traduire ce segment]";
            }
        }

        // NAVIGATION
        window.changePage = (offset) => {
            let next = pageNum + offset;
            if (next >= 1 && next <= pdfDoc.numPages) {
                pageNum = next;
                document.getElementById('pageNumber').value = pageNum;
                renderAll();
            }
        };

        window.onload = () => {
            lucide.createIcons();
            init();
        };
    </script>
</body>
            </html>
