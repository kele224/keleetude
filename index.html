<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Etude | Excellence Arabe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-h-screen;
        }
        .ar-font { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            direction: rtl; 
            line-height: 2.2;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loader-bar {
            height: 4px;
            width: 100%;
            background: #e2e8f0;
            overflow: hidden;
            position: relative;
        }
        .loader-progress {
            width: 30%;
            height: 100%;
            background: #3b82f6;
            animation: move 1.5s infinite ease-in-out;
        }
        @keyframes move {
            0% { left: -30%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body class="text-slate-900">

    <!-- HEADER -->
    <nav class="glass sticky top-0 z-50 border-b border-slate-200 px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-500/30">
                <i data-lucide="graduation-cap" class="w-6 h-6"></i>
            </div>
            <div>
                <span class="text-xl font-extrabold tracking-tight block">Kele-<span class="text-blue-600">Etude</span></span>
                <span class="text-[9px] uppercase font-bold text-slate-400 tracking-[0.2em]">Grammaire Arabe</span>
            </div>
        </div>
        
        <div class="flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
            <button onclick="changePage(-1)" class="p-2 hover:bg-white rounded-xl transition text-slate-600"><i data-lucide="chevron-left"></i></button>
            <div class="px-4 flex flex-col items-center">
                <span class="text-[10px] font-black text-slate-400 uppercase">Page</span>
                <input type="number" id="pageNumber" value="15" onchange="loadLesson()" class="bg-transparent font-bold text-blue-600 w-10 text-center outline-none">
            </div>
            <button onclick="changePage(1)" class="p-2 hover:bg-white rounded-xl transition text-slate-600"><i data-lucide="chevron-right"></i></button>
        </div>
    </nav>

    <!-- BARRE DE CHARGEMENT IA -->
    <div id="loading-bar" class="hidden loader-bar">
        <div class="loader-progress"></div>
    </div>

    <main class="max-w-4xl mx-auto p-6 space-y-8 mt-4">
        
        <!-- CARTE TEXTE ORIGINAL -->
        <div class="bg-white rounded-[40px] shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-8 py-4 border-b border-slate-50 flex items-center justify-between bg-slate-50/50">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="book-open" class="w-3 h-3 text-blue-600"></i> Texte du Manuel
                </span>
                <button onclick="speakText()" class="text-slate-400 hover:text-blue-600 transition"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
            </div>
            <div id="ar-content" class="p-10 ar-font text-2xl md:text-3xl text-slate-800 transition-all duration-500">
                Initialisation...
            </div>
        </div>

        <!-- CARTE TRADUCTION IA -->
        <div class="bg-slate-900 rounded-[40px] shadow-2xl p-10 text-white relative overflow-hidden group">
            <!-- Déco visuelle -->
            <div class="absolute -top-24 -left-24 w-64 h-64 bg-blue-600/20 rounded-full blur-[100px]"></div>
            
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-1 w-8 bg-blue-500 rounded-full"></div>
                    <h2 class="text-blue-400 font-bold text-xs uppercase tracking-[0.3em]">Explication Française (IA)</h2>
                </div>

                <div id="fr-content" class="text-slate-300 leading-relaxed text-lg md:text-xl font-medium min-h-[100px]">
                    L'intelligence artificielle Kele analyse la page...
                </div>

                <div class="mt-8 flex items-center justify-between border-t border-slate-800 pt-6">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Connecté au Traducteur</span>
                    </div>
                    <button onclick="copyFr()" class="p-2 text-slate-500 hover:text-white transition"><i data-lucide="copy" class="w-4 h-4"></i></button>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let extractedText = "";

        // FONCTION : CHARGER LA LEÇON
        window.loadLesson = async () => {
            const pageNum = parseInt(document.getElementById('pageNumber').value);
            const arDisplay = document.getElementById('ar-content');
            const frDisplay = document.getElementById('fr-content');
            const loadingBar = document.getElementById('loading-bar');

            loadingBar.classList.remove('hidden');
            arDisplay.classList.add('opacity-40');
            frDisplay.classList.add('opacity-40');

            try {
                // 1. Lire le PDF
                const loadingTask = pdfjsLib.getDocument('manuel.pdf');
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                extractedText = textContent.items.map(item => item.str).join(' ');

                // Nettoyage rapide du texte
                extractedText = extractedText.replace(/\s+/g, ' ').trim();

                if (extractedText.length < 5) {
                    arDisplay.innerText = "Page vide ou image indéchiffrable.";
                    frDisplay.innerText = "-";
                } else {
                    arDisplay.innerText = extractedText;
                    // 2. Lancer la traduction AUTO
                    await translateAuto(extractedText);
                }
            } catch (e) {
                arDisplay.innerText = "Erreur de chargement du manuel.";
            } finally {
                loadingBar.classList.add('hidden');
                arDisplay.classList.remove('opacity-40');
                frDisplay.classList.remove('opacity-40');
            }
        };

        // FONCTION : TRADUCTION AUTOMATIQUE
        async function translateAuto(text) {
            const frDisplay = document.getElementById('fr-content');
            try {
                const app = await Client.connect("soumah224/mon-traducteur");
                const result = await app.predict("/predict", [text, "Arabe", "Français"]);
                frDisplay.innerHTML = result.data[0].replace(/\n/g, '<br>');
            } catch (e) {
                frDisplay.innerText = "L'IA n'a pas pu traduire cette page.";
            }
        }

        // NAVIGATION
        window.changePage = (offset) => {
            const input = document.getElementById('pageNumber');
            let newPage = parseInt(input.value) + offset;
            if (newPage < 1) newPage = 1;
            input.value = newPage;
            loadLesson();
        };

        // AUDIO (Optionnel : Lit le texte Arabe)
        window.speakText = () => {
            const msg = new SpeechSynthesisUtterance(extractedText);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        };

        window.copyFr = () => {
            navigator.clipboard.writeText(document.getElementById('fr-content').innerText);
            alert("Traduction copiée !");
        };

        window.onload = () => {
            lucide.createIcons();
            loadLesson();
        };
    </script>
</body>
    </html>
