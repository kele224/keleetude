<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Etude | Apprentissage Intelligent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .ar-font { font-family: 'Noto Sans Arabic', sans-serif; direction: rtl; }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
        .arabic-card { border-right: 5px solid #3b82f6; }
    </style>
</head>
<body class="pb-10">

    <!-- BARRE DE NAVIGATION -->
    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                    <i data-lucide="graduation-cap" class="w-5 h-5"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight text-slate-800">Kele-<span class="text-blue-600">Etude</span></span>
            </div>
            
            <div class="flex items-center bg-slate-100 rounded-full px-3 py-1 border border-slate-200">
                <span class="text-[10px] font-bold text-slate-400 mr-2 uppercase">Page</span>
                <input type="number" id="pageNumber" value="15" class="w-12 bg-transparent font-bold text-blue-600 outline-none text-sm">
                <button onclick="chargerPage()" class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-bold ml-1">OK</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-6 space-y-6">
        
        <!-- SECTION AFFICHAGE DU COURS -->
        <div class="bg-white rounded-[32px] p-6 shadow-sm border border-slate-200 arabic-card">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="book-open" class="w-3 h-3"></i> Contenu Original (Arabe)
                </h2>
                <button onclick="copyAr()" class="text-slate-400 hover:text-blue-600"><i data-lucide="copy" class="w-4 h-4"></i></button>
            </div>
            <div id="ar-content" class="ar-font text-2xl md:text-3xl leading-[1.8] text-slate-800 min-h-[150px] whitespace-pre-wrap">
                Chargement du manuel...
            </div>
        </div>

        <!-- SECTION TRADUCTION -->
        <div class="bg-slate-900 rounded-[32px] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-600/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-blue-400 font-bold text-xs uppercase tracking-widest">Kele-Traducteur IA</h2>
                    <p class="text-slate-400 text-[10px]">Traduction automatique du cours</p>
                </div>
                <button onclick="traduireTout()" id="btn-tr" class="w-full md:w-auto bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all active:scale-95">
                    <i data-lucide="sparkles" class="w-4 h-4"></i> Traduire la page
                </button>
            </div>

            <div id="fr-content" class="text-slate-300 leading-relaxed text-lg italic border-l-2 border-slate-700 pl-4">
                L'explication en français apparaîtra ici après avoir cliqué sur le bouton.
            </div>
        </div>

    </main>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        
        // Configuration de la librairie PDF
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentText = "";

        // FONCTION : LIRE LE PDF DEPUIS GITHUB
        window.chargerPage = async () => {
            const pageNum = parseInt(document.getElementById('pageNumber').value);
            const display = document.getElementById('ar-content');
            display.innerHTML = '<div class="flex gap-2 items-center text-slate-400 text-sm"><div class="loader rounded-full border-2 border-t-2 h-4 w-4"></div> Analyse de la page...</div>';

            try {
                // Charge le PDF situé dans le même dossier
                const loadingTask = pdfjsLib.getDocument('manuel.pdf');
                const pdf = await loadingTask.promise;
                
                if(pageNum > pdf.numPages || pageNum < 1) {
                    display.innerText = "Cette page n'existe pas.";
                    return;
                }

                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                
                // On extrait et nettoie le texte
                currentText = textContent.items.map(item => item.str).join(' ');
                
                if(currentText.trim() === "") {
                    display.innerText = "Désolé, cette page semble être une image. L'IA ne peut pas lire le texte directement.";
                } else {
                    display.innerText = currentText;
                }
                
            } catch (e) {
                display.innerHTML = "<span class='text-red-500 text-sm font-bold'>Erreur : Le fichier manuel.pdf est introuvable.</span>";
            }
        };

        // FONCTION : TRADUIRE VIA TON API HUGGING FACE
        window.traduireTout = async () => {
            if(!currentText || currentText.length < 5) return alert("Chargez une page avec du texte d'abord.");
            
            const btn = document.getElementById('btn-tr');
            const frDisplay = document.getElementById('fr-content');

            btn.disabled = true;
            btn.innerHTML = '<div class="loader rounded-full border-2 border-t-2 h-4 w-4 mr-2"></div> Traduction...';
            frDisplay.innerText = "Analyse grammaticale en cours...";

            try {
                const app = await Client.connect("soumah224/mon-traducteur");
                const result = await app.predict("/predict", [currentText, "Arabe", "Français"]);
                frDisplay.innerHTML = result.data[0].replace(/\n/g, '<br>');
            } catch (e) {
                frDisplay.innerText = "Erreur de connexion avec l'API Kele-Traducteur.";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="sparkles" class="w-4 h-4"></i> Traduire la page';
                lucide.createIcons();
            }
        };

        window.copyAr = () => {
            navigator.clipboard.writeText(currentText);
            alert("Texte arabe copié !");
        }

        // Démarrage automatique
        window.onload = () => {
            lucide.createIcons();
            chargerPage();
        };
    </script>
</body>
  </html>
